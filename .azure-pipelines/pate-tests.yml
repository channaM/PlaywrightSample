name: pate-e2e-$(Rev:rrr)

# ─────────────────────────────────────────────────────────────────────────────
# Power Apps Test Engine (PATE) — Azure DevOps Pipeline
# Runs *.fx.yaml test suites using the Power Platform CLI (pac test run).
# PATE uses Playwright (Chromium) internally to drive the Canvas App.
#
# Test file : tests/TC1_PJC_001.fx.yaml
# App       : capop_opexcapexapprovalappv34_ddc56
# Persona   : User1  (env vars: user1Email / user1Password)
#
# BEFORE USE:
#   1. Replace every "# CHANGE THIS" value below with your own.
#   2. Add pipeline secret variables in ADO:
#        user1Password = <test account password>
#      (Pipelines → Edit → Variables → + Add → tick "Keep this value secret")
#   3. Import this file in ADO:
#        Pipelines → New pipeline → GitHub → select repo →
#        Existing YAML file → .azure-pipelines/pate-tests.yml
# ─────────────────────────────────────────────────────────────────────────────

trigger: none
pr: none

schedules:
  - cron: '0 6 * * 1-5'
    displayName: Daily PATE tests (weekdays 06:00 UTC)
    branches:
      include:
        - main
    always: true

variables:
  # ── Power Platform environment ───────────────────────────────────────────────
  - name: POWER_APPS_ENVIRONMENT_URL
    value: 'https://devhugoplaygroundpoc.crm4.dynamics.com/'   # CHANGE THIS — your Dataverse URL
  - name: POWER_APPS_ENVIRONMENT_ID
    value: '493ec420-26dc-ebc2-9bc0-11821149f051' # CHANGE THIS — environment GUID

  # ── Tenant / Auth ─────────────────────────────────────────────────────────────
  - name: AZURE_TENANT_ID
    value: '47f44079-0021-4177-80c9-68531941e357'           # CHANGE THIS

  # ── Test user (User1 persona defined in TC1_PJC_001.fx.yaml) ─────────────────
  - name: user1Email
    value: 'mengchanna1991@gmail.com'        # CHANGE THIS
  # user1Password is added as a SECRET pipeline variable (not listed here)

  # ── Test file glob ─────────────────────────────────────────────────────────────
  - name: testPlanFile
    value: 'tests/TC1_PJC_001.fx.yaml'

stages:
  - stage: PATETests
    displayName: 'Power Apps Test Engine — TC1_PJC_001'
    jobs:
      - job: RunPATETests
        displayName: 'Run *.fx.yaml tests (pac test run)'
        timeoutInMinutes: 60
        pool:
          name: 'TEST POOL'   # self-hosted agent on Mac

        steps:
          - checkout: self

          # ── Install pac CLI via .NET global tool ─────────────────────────────
          - task: UseDotNet@2
            displayName: 'Use .NET 8'
            inputs:
              packageType: sdk
              version: '10.x'

          - bash: |       
              dotnet tool install --global Microsoft.PowerApps.CLI.Tool || true
              echo "##vso[task.prependpath]$HOME/.dotnet/tools"                                                        
              $HOME/.dotnet/tools/pac help || true
            displayName: 'Install pac CLI (.NET global tool)' 

          # ── Install Playwright / Chromium for PATE ──────────────────────────
          - task: NodeTool@0
            displayName: 'Use Node.js 20.x'
            inputs:
              versionSpec: '20.x'

          - bash: npx playwright install chromium --with-deps
            displayName: 'Pre-install Playwright Chromium'
            failOnStderr: false
            timeoutInMinutes: 15

          # ── Run the fx.yaml test suite ──────────────────────────────────────
          - bash: |                                                                                                    
              $HOME/.dotnet/tools/pac auth create \
                --username "$(user1Email)" \                                                                           
                --password "$(user1Password)" \
                --environment "$(POWER_APPS_ENVIRONMENT_URL)" \                                                        
                --tenant "$(AZURE_TENANT_ID)"                                                                          
          
              $HOME/.dotnet/tools/pac test run \                                                                       
                --test-plan-file "$(testPlanFile)" \
                --environment-id "$(POWER_APPS_ENVIRONMENT_ID)" \
                --tenant "$(AZURE_TENANT_ID)" \                                                                        
                --output-directory "$(Build.SourcesDirectory)/TestOutput"
            displayName: 'pac test run — TC1_PJC_001.fx.yaml'                                                          
            workingDirectory: $(Build.SourcesDirectory)
            env:                                                                                                       
              user1Email: $(user1Email)
              user1Password: $(user1Password)  

          # ── Publish JUnit test results ──────────────────────────────────────
          - task: PublishTestResults@2
            displayName: 'Publish test results — TC1_PJC_001'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '**/TestOutput/*.xml'
              searchFolder: $(Build.SourcesDirectory)
              testRunTitle: 'PATE — TC1_PJC_001 Can save project'
              failTaskOnFailedTests: true

          # ── Publish test artifacts (videos, traces) ─────────────────────────
          - task: PublishPipelineArtifact@1
            displayName: 'Publish test artifacts — TC1_PJC_001'
            condition: succeededOrFailed()
            inputs:
              targetPath: $(Build.SourcesDirectory)/TestOutput
              artifact: PATE-Artifacts-TC1_PJC_001
